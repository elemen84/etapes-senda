<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Etapa 5 &middot; Lizara - Somport</title>
    <link rel="icon" href="assets/mountain-logo-transparent.png" />
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="styles.css?v=audit-1" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#173f25" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
  </head>
  <body>
    <main class="app-shell" id="appShell" data-stage="5">
      <header class="stage-header">
        <a class="back-button" href="index.html" aria-label="Tornar a inici">&lsaquo;</a>
        <h1>ETAPA 5 LIZARA - SOMPORT</h1>
        <div class="map-mode-control" id="mapModeControl" role="group" aria-label="Mode de mapa">
          <button class="map-mode-button" id="onlineModeButton" type="button" data-mode="online">Online</button>
          <button class="map-mode-button" id="offlineModeButton" type="button" data-mode="offline">Offline</button>
        </div>
      </header>

      <section class="map-wrap" aria-label="Mapa de l'etapa 5">
        <div id="map" class="map"></div>
        <div class="map-status" id="geoStatus" hidden></div>
        <button class="locate-button" id="locateButton" type="button" aria-label="Centrar en la meva ubicació">
          <span aria-hidden="true"></span>
        </button>
        <div class="offline-prep" id="offlinePrep" data-state="idle">
          <button
            class="offline-prep-button"
            id="prepareOfflineButton"
            type="button"
            title="A iOS/Safari l'emmagatzematge offline pot caducar; prepara l'etapa abans de sortir."
          >
            <span class="offline-prep-dot" aria-hidden="true"></span>
            <span class="offline-prep-text" id="offlinePrepText">Preparar offline</span>
          </button>
          <span class="offline-prep-bar" aria-hidden="true"><span class="offline-prep-bar-fill" id="offlineBarFill"></span></span>
        </div>
      </section>

      <section class="profile-panel" id="profilePanel" aria-label="Perfil d'altitud">
        <button class="panel-handle" id="sheetHandle" type="button" aria-label="Amagar o mostrar el perfil"></button>
        <div class="selected-stats">
          <div class="stat-chip">
            <span class="pin-icon" aria-hidden="true"></span>
            <strong id="selectedKm">0,0 km</strong>
          </div>
          <div class="stat-chip">
            <span class="mountain-icon" aria-hidden="true"></span>
            <strong id="selectedElevation">0 m</strong>
          </div>
          <button class="measure-button" id="measureButton" type="button" aria-pressed="false">Mesurar tram</button>
          <strong class="segment-result" id="segmentResult" hidden></strong>
        </div>
        <div class="profile-chart" id="profileInteraction">
          <svg id="profileSvg" role="img" aria-label="Perfil d'altitud de Lizara a Somport"></svg>
        </div>
        <div class="profile-axis">
          <span>0 km</span>
          <strong id="cursorKm">0,0 km</strong>
          <span id="totalKm">0,0 km</span>
        </div>
      </section>
    </main>

    <script src="vendor/leaflet/leaflet.js"></script>
    <script src="app.js?v=audit-1"></script>
    <script src="register-sw.js?v=audit-1"></script>
    <script src="offline-tiles.js?v=phase2"></script>
  </body>
</html>
